<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión Trabajadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
</head>
<body class="bg-light">
    <header class="bg-primary py-3 mb-5">
        <div class="container text-center">
            <h1 class="text-white">Sistema de gestión de trabajadores</h1>
        </div>
    </header>
    <main class="container">
        <div class="row mt-4">
            <div class="col-8">
                <div class="card rounded shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title text-primary mb-3">Datos del nuevo trabajador</h4>
                        <form>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nombre" placeholder=" ">
                                <label for="nombre">Nombre</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="apellido" placeholder=" ">
                                <label for="apellido">Primer Apellido</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="correo" placeholder=" " required>
                                <label for="correo">Correo electrónico</label>
                            </div>
                            <select class="form-select mb-3" id="departamento">
                                <option selected disabled>Seleccione departamento</option>
                                <option value="it">IT</option>
                                <option value="marketing">Marketing</option>
                                <option value="ventas">Ventas</option>
                                <option value="administracion">Administración</option>
                            </select>
                            <button type="button" class="btn btn-primary w-100 mt-3" id="botonGuardar">Guardar cambios</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title text-primary text-center mb-3">Trabajadores</h4>
                        <ul class="list-group" id="listaTrabajadores"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-primary text-center mb-4">Trabajadores por departamento</h3>
                        <ul class="list-group list-group-flush w-50 mx-auto">
                            <li class="list-group-item d-flex justify-content-between align-items-center mb-2">
                            IT
                            <span id="contadorIT" class="badge bg-primary">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center mb-2">
                            MARKETING
                            <span id="contadorMarketing" class="badge bg-success">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center mb-2">
                            VENTAS
                            <span id="contadorVentas" class="badge bg-warning">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center mb-2">
                            ADMINISTRACIÓN
                            <span id="contadorAdministracion" class="badge bg-info">0</span>
                            </li>
                        </ul>
                    </div>
                </div>  
            </div>
        </div>

    </main>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        Sistema de gestión de trabajadores || Departamento de Recursos Humanos
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
